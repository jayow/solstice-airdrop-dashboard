name: Daily S2 refresh

on:
  schedule:
    # 00:05 UTC daily — 5 min after Solstice's 00:00 UTC snapshot boundary.
    # This captures the just-completed day; running before midnight would only
    # see the previous day's already-known totals.
    - cron: '5 0 * * *'
  workflow_dispatch:   # allow manual trigger

# Allow the workflow to push commits back to the repo
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need write access to push back data.json + daily_totals.json
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore SQLite DB cache
        id: db-cache
        uses: actions/cache@v4
        with:
          path: data/solstice.db
          # Versioned key — bump when DB schema changes to invalidate cache.
          # Restore prior run's DB so we keep classifications + quest_cache.
          key: solstice-db-v1-${{ github.run_id }}
          restore-keys: |
            solstice-db-v1-

      - name: Bootstrap DB if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          if [ -f data/solstice.db ]; then
            echo "DB cache restored ($(du -h data/solstice.db | cut -f1))"
            exit 0
          fi
          # Try downloading the seed DB from the `db-cache` release. This is
          # uploaded by `tools/upload_db_to_release.sh` locally so the first
          # CI run doesn't have to rebuild everything from chain (~25 min vs
          # 10 min steady-state).
          if gh release view db-cache --json tagName 2>/dev/null >/dev/null; then
            echo "Pulling DB seed from release 'db-cache'..."
            gh release download db-cache --pattern 'solstice.db.gz' --dir data
            if [ -f data/solstice.db.gz ]; then
              gunzip data/solstice.db.gz
              echo "Seed DB unpacked ($(du -h data/solstice.db | cut -f1))"
              exit 0
            fi
          fi
          # No seed and no cache — start from scratch.
          echo "No DB cache or release seed — first run will rebuild everything from chain (slow)."
          python3 -c "
          import sqlite3
          con = sqlite3.connect('data/solstice.db')
          con.execute('CREATE TABLE IF NOT EXISTS wallets (wallet TEXT PRIMARY KEY, first_seen_ts INTEGER, last_active_ts INTEGER, classification TEXT, cohort TEXT, is_s1 INTEGER DEFAULT 0, in_partner_footprint INTEGER DEFAULT 0, in_exponent INTEGER DEFAULT 0, n_protocols INTEGER DEFAULT 0, notes TEXT)')
          con.commit()
          "

      - name: Write .env for RPC
        env:
          HELIUS_URL: ${{ secrets.HELIUS_URL }}
        run: |
          if [ -z "$HELIUS_URL" ]; then
            echo "::error::HELIUS_URL secret is not set. Add it in Repo Settings → Secrets → Actions."
            exit 1
          fi
          echo "helius_url=$HELIUS_URL" > .env

      - name: Run refresh
        run: bash server/refresh.sh

      - name: Commit + push updated dashboard data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/data.json server/daily_totals.json
          if git diff --cached --quiet; then
            echo "No changes to commit (dashboard data is already current)."
          else
            git commit -m "Daily refresh: $(date -u +%Y-%m-%d) 00:00 UTC snapshot"
            git push
          fi

      - name: Upload refresh logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refresh-logs-${{ github.run_id }}
          path: /tmp/walker_logs/refresh_*.log
          retention-days: 7
